<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krypton — Live Indian Train Radar</title>
    <meta name="description" content="Real-time Indian train tracking radar with live positions, reachability analysis, and journey history.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div id="map"></div>

    <div id="ui-sidebar">
        <h1><span class="pulse"></span> RAIL COMMAND</h1>

        <!-- Autocomplete datalist populated by JS -->
        <datalist id="station_list"></datalist>

        <!-- ===== TABS ===== -->
        <div class="tabs">
            <button id="radarTab" class="tab-btn active" type="button" onclick="switchTab('radar')">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
                Radar
            </button>
            <button id="reachTab" class="tab-btn" type="button" onclick="switchTab('reach')">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                Reach
            </button>
            <button id="journeysTab" class="tab-btn" type="button" onclick="switchTab('journeys')">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                Journeys
            </button>
        </div>

        <!-- ===== RADAR TAB ===== -->
        <form id="locationForm" class="tab-content active">
            <h2>Radar Parameters</h2>
            <div class="form-group">
                <label for="main_train">Train Number</label>
                <input type="text" id="main_train" name="main_train" placeholder="e.g. 12952" required>
            </div>
            <div class="form-group">
                <label for="journey_date">Journey Date</label>
                <input type="date" id="journey_date" name="journey_date" required>
            </div>
            <div class="form-group">
                <label for="last_known_station">Reference Station (optional fallback)</label>
                <input type="text" id="last_known_station" name="last_known_station" list="station_list" placeholder="Optional station code or name" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="spatial_range_loc">Scan Radius (km)</label>
                <input type="number" id="spatial_range_loc" name="spatial_range" value="{{ default_range }}" min="10" max="3000" required>
            </div>

            <div id="liveTimeDisplay" class="sim-time-box" style="display:none;"></div>

            <div class="btn-group">
                <button type="submit" id="submitBtn" class="btn-primary">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    Find Live Trains
                </button>
                <button type="button" id="startTrackingBtn" class="btn-green" style="display:none;">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    Track Live
                </button>
                <button type="button" id="stopBtn" class="btn-red" style="display:none;">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                    Stop
                </button>
            </div>

            <div id="trackingStatus" class="statusBox"></div>

            <div class="results-section">
                <table id="locationTable" style="display:none;">
                    <thead><tr><th>Train</th><th>Name</th><th>Location</th></tr></thead>
                    <tbody id="locationTbody"></tbody>
                </table>
            </div>
        </form>

        <!-- ===== REACHABILITY TAB ===== -->
        <form id="reachForm" class="tab-content">
            <h2>Isochrone Parameters</h2>
            <div class="form-group">
                <label for="origin_station">Origin Station</label>
                <input type="text" id="origin_station" name="origin_station" list="station_list" placeholder="Station code or name" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Transit Window: <strong id="hours_val">24</strong> Hours</label>
                <input type="range" id="max_hours" name="max_hours" min="1" max="100" value="24" step="1" oninput="updateSliderLabel(this.value)">
                <div class="slider-ticks">
                    <span>1h</span><span>24h</span><span>48h</span><span>72h</span><span>100h</span>
                </div>
            </div>
            <div class="btn-group">
                <button type="submit" id="reachBtn" class="btn-primary">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    Analyze Reach
                </button>
            </div>

            <div class="results-section">
                <table id="reachResultsTable" style="display:none;">
                    <thead><tr><th>Station</th><th>Code</th><th>Train</th><th>Time</th><th>Dist</th></tr></thead>
                    <tbody id="reachResultsBody"></tbody>
                </table>
            </div>
        </form>

        <!-- ===== MY JOURNEYS TAB ===== -->
        <div id="journeysPanel" class="tab-content">
            <h2>My Train History</h2>
            <div class="journey-stats" id="journeyStats"></div>
            <div class="btn-group">
                <button type="button" id="loadJourneysBtn" class="btn-primary" onclick="loadJourneys()">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    Load Map
                </button>
            </div>

            <!-- Manual Add Trip -->
            <details class="add-trip-section">
                <summary>+ Add Trip Manually</summary>
                <form id="addTripForm" onsubmit="addTrip(event)">
                    <div class="form-group">
                        <label for="manual_train">Train Number</label>
                        <input type="text" id="manual_train" name="train_number" placeholder="e.g. 12952" required>
                    </div>
                    <div class="form-group">
                        <label for="manual_origin">From Station</label>
                        <input type="text" id="manual_origin" name="origin" list="station_list" placeholder="Station code" autocomplete="off" required>
                    </div>
                    <div class="form-group">
                        <label for="manual_dest">To Station</label>
                        <input type="text" id="manual_dest" name="destination" list="station_list" placeholder="Station code" autocomplete="off" required>
                    </div>
                    <div class="form-group">
                        <label for="manual_date">Date of Journey</label>
                        <input type="date" id="manual_date" name="journey_date">
                    </div>
                    <div class="btn-group">
                        <button type="submit" id="addTripBtn" class="btn-green">
                            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                            Save Trip
                        </button>
                    </div>
                </form>
            </details>

            <div class="results-section">
                <table id="journeysTable" style="display:none;">
                    <thead><tr><th>Date</th><th>Route</th><th>Train</th><th>KM</th></tr></thead>
                    <tbody id="journeysTbody"></tbody>
                </table>
            </div>
        </div>

        <div id="status" class="statusBox"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
